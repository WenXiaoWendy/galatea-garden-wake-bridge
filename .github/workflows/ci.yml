name: 跨平台检查

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Node.js ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node:
          - 20
          - 22

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npm run typecheck

      - name: 构建并测试
        run: npm test

      - name: 检查 PowerShell 保活脚本
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/run-watchdog.ps1 -Check
